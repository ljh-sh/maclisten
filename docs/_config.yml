title: maclisten
description: Private, lightweight macOS ASR CLI for local speech-to-text from files, microphone, and continuous keyword listening.
baseurl: "/maclisten"
url: "https://ljh-sh.github.io"

permalink: pretty

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-relative-links
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: true

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
