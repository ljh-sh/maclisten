name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          swift --version

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test
