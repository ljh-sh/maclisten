changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Security
      labels:
        - security
    - title: Added
      labels:
        - enhancement
    - title: Fixed
      labels:
        - bug
    - title: Changed
      labels:
        - documentation
        - maintenance
    - title: Other Changes
      labels:
        - "*"
