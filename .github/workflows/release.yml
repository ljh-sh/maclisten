name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.0.0)'
        required: true
        default: v0.0.0-test

permissions: read-all

jobs:
  build:
    name: Build (arm64 + x64 on Apple Silicon)
    runs-on: macos-14
    permissions:
      contents: read
      actions: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          swift --version
          xcrun --show-sdk-version

      - name: Build & package both arches
        env:
          SOURCE_DATE_EPOCH: 1700000000
          ZERO_AR_DATE: 1
          TZ: UTC
          LC_ALL: C
        run: .x-cmd/release release

      - name: Verify reproducibility & no privacy leaks
        run: .x-cmd/release verify darwin-arm64

      - name: List artifacts
        run: ls -la .release-artifacts/

      - name: Generate SLSA provenance subjects
        id: hash
        working-directory: .release-artifacts
        run: |
          hashes=$(shasum -a 256 maclisten-*.tar.xz BUILD_INFO.txt SHA256SUMS | base64 | tr -d '\n')
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: |
            .release-artifacts/maclisten-darwin-arm64.tar.xz
            .release-artifacts/maclisten-darwin-x64.tar.xz
            .release-artifacts/maclisten-darwin-universal.tar.xz
            .release-artifacts/BUILD_INFO.txt
            .release-artifacts/SHA256SUMS

  provenance:
    name: Generate SLSA provenance
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    # The SLSA reusable workflow must be referenced by semver tag, not SHA.
    # Audit anchor for v2.1.0: f7dd8c54c2067bafc12ca7a55595d5ee9b75204a
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: false

  release:
    name: Create GitHub Release
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "name=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "name=${REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts

      - name: Download SLSA provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artifacts
        run: |
          for f in artifacts/*.tar.xz artifacts/SHA256SUMS artifacts/BUILD_INFO.txt; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --bundle="${f}.sigstore.json" "$f"
          done

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            artifacts/maclisten-darwin-*.tar.xz
            artifacts/SHA256SUMS
            artifacts/BUILD_INFO.txt
            artifacts/*.sigstore.json
            artifacts/*.intoto.jsonl
